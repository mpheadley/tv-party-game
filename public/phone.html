<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Party Game — Join</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOIN -->
  <div id="screen-join" class="phone-container">
    <h1>Party Game</h1>
    <div class="join-form">
      <input type="text" id="name-input" placeholder="Your name" maxlength="20" autocomplete="off">
      <label class="emoji-label">Pick your avatar</label>
      <div class="emoji-picker" id="emoji-picker"></div>
      <button id="btn-join">Join Game</button>
    </div>
    <p class="status" id="join-error" style="color:#ff6b6b;"></p>
  </div>

  <!-- WAITING IN LOBBY -->
  <div id="screen-waiting" class="phone-container hidden">
    <div class="phone-avatar" id="my-avatar"></div>
    <h1>You're In!</h1>
    <p class="waiting-msg" id="waiting-name"></p>
    <!-- Host controls in lobby -->
    <div id="host-lobby-controls" class="host-controls hidden">
      <p class="host-label">You're the host!</p>
      <div class="phone-round-picker">
        <button class="phone-round-option" data-rounds="5">Quick<br><span>~8 min</span></button>
        <button class="phone-round-option selected" data-rounds="10">Normal<br><span>~15 min</span></button>
        <button class="phone-round-option" data-rounds="15">Long<br><span>~22 min</span></button>
      </div>
      <button class="btn-host" id="btn-host-start" disabled>Start Game</button>
      <p class="status" id="host-lobby-status">Waiting for players...</p>
    </div>
    <p class="status" id="non-host-status">Waiting for the game to start...</p>
  </div>

  <!-- ANSWER PROMPT -->
  <div id="screen-answer" class="phone-container hidden">
    <p class="phone-prompt" id="phone-prompt"></p>
    <div class="phone-timer" id="phone-timer"></div>
    <div class="phone-answer">
      <textarea id="answer-input" placeholder="Type your answer..." maxlength="200"></textarea>
      <button id="btn-submit">Submit Answer</button>
    </div>
  </div>

  <!-- ANSWER SUBMITTED -->
  <div id="screen-answered" class="phone-container hidden">
    <p class="waiting-msg">Answer submitted!</p>
    <p class="status" id="my-answer-note" style="color:#667eea; font-style:italic; margin-top:1rem;"></p>
    <p class="status">Waiting for everyone else...</p>
  </div>

  <!-- VOTE -->
  <div id="screen-vote" class="phone-container hidden">
    <p class="phone-prompt">Vote for your favorite!</p>
    <p class="phone-prompt-reminder" id="vote-prompt-reminder"></p>
    <div class="phone-timer" id="vote-timer"></div>
    <div class="vote-options" id="vote-options"></div>
  </div>

  <!-- VOTE SUBMITTED -->
  <div id="screen-voted" class="phone-container hidden">
    <p class="waiting-msg">Vote cast!</p>
    <p class="status">Results coming up on the TV...</p>
  </div>

  <!-- RESULTS / BETWEEN ROUNDS -->
  <div id="screen-round-end" class="phone-container hidden">
    <p class="round-label" id="phone-round-label"></p>
    <p class="snarky-commentary" id="phone-commentary"></p>
    <div class="phone-results" id="phone-results"></div>
    <p class="status" id="phone-score" style="margin-top:1rem; font-size:1.4rem; color:#667eea; font-weight:bold;"></p>
    <div class="phone-scoreboard" id="phone-scoreboard"></div>
    <button class="btn-host host-only hidden" id="btn-host-next" style="margin-top:1rem;">Next Round</button>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="phone-container hidden">
    <h1>Game Over!</h1>
    <p class="phone-rank" id="final-rank"></p>
    <p class="status" id="final-score"></p>
    <div class="phone-scoreboard" id="final-phone-scoreboard"></div>
    <button class="btn-host host-only hidden" id="btn-host-again" style="margin-top:1rem;">Play Again</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myId = null;
    let phoneTimer = null;
    let hasSubmitted = false;
    let isHost = false;

    // ── Sound Effects (Web Audio API) ──
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      ensureAudio();
      if (!audioCtx) return;

      switch (type) {
        case 'join': playTone([440, 554, 659], 0.08, 'sine'); break;
        case 'round-start': playTone([330, 440, 554, 659], 0.12, 'square'); break;
        case 'submit': playTone([500, 600], 0.06, 'sine'); break;
        case 'vote-cast': playTone([600, 800], 0.06, 'sine'); break;
        case 'times-up': playTone([440, 330, 220], 0.2, 'sawtooth'); break;
        case 'results': playTone([330, 440, 554, 659, 880], 0.15, 'sine'); break;
        case 'reveal': playReveal(); break;
        case 'tick': playTick(); break;
        case 'gameover': playFanfare(); break;
      }
    }

    function playTone(freqs, duration, type) {
      freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * duration);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * duration + duration + 0.1);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * duration);
        osc.stop(audioCtx.currentTime + i * duration + duration + 0.15);
      });
    }

    function playFanfare() {
      const melody = [523, 659, 784, 1047, 784, 1047];
      const durations = [0.15, 0.15, 0.15, 0.3, 0.1, 0.4];
      let time = audioCtx.currentTime;
      melody.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + durations[i]);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + durations[i] + 0.05);
        time += durations[i];
      });
    }

    function playReveal() {
      // Dramatic reveal — rising sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.45);
    }

    function playTick() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.06);
    }

    // ── Text-to-Speech ──
    let cachedVoices = [];
    if ('speechSynthesis' in window) {
      cachedVoices = speechSynthesis.getVoices();
      speechSynthesis.addEventListener('voiceschanged', () => {
        cachedVoices = speechSynthesis.getVoices();
      });
    }

    function speakPrompt(text) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.9;
      utter.pitch = 0.8;
      const funVoice = cachedVoices.find(v => /Daniel|Samantha|Alex|Fred|Zarvox|Trinoids/i.test(v.name));
      if (funVoice) utter.voice = funVoice;
      speechSynthesis.speak(utter);
    }

    // Haptic feedback
    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // Screens
    const screens = {
      join: document.getElementById('screen-join'),
      waiting: document.getElementById('screen-waiting'),
      answer: document.getElementById('screen-answer'),
      answered: document.getElementById('screen-answered'),
      vote: document.getElementById('screen-vote'),
      voted: document.getElementById('screen-voted'),
      roundEnd: document.getElementById('screen-round-end'),
      gameover: document.getElementById('screen-gameover'),
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.add('hidden'));
      screens[name].classList.remove('hidden');
    }

    // Store socket ID
    socket.on('connect', () => { myId = socket.id; });

    // Sound events from server
    socket.on('sound', (type) => { playSound(type); });

    // Emoji picker
    const AVATARS = ['🦊', '🐸', '🦉', '🐙', '🦄', '🐲', '🦋', '🐢', '🦁', '🐧', '🦖', '🐬', '🦩', '🐨', '🦝', '🐝'];
    let selectedAvatar = AVATARS[0];
    const emojiPicker = document.getElementById('emoji-picker');

    AVATARS.forEach((emoji, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'emoji-option' + (i === 0 ? ' selected' : '');
      btn.textContent = emoji;
      btn.addEventListener('click', () => {
        selectedAvatar = emoji;
        emojiPicker.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      emojiPicker.appendChild(btn);
    });

    // Join
    const nameInput = document.getElementById('name-input');
    const btnJoin = document.getElementById('btn-join');

    btnJoin.addEventListener('click', joinGame);
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinGame();
    });

    function joinGame() {
      const name = nameInput.value.trim();
      if (!name) return;
      ensureAudio(); // Unlock audio on first user interaction
      btnJoin.disabled = true;
      socket.emit('join', { name, avatar: selectedAvatar });
    }

    socket.on('joined', (data) => {
      document.getElementById('waiting-name').textContent = `Welcome, ${data.name}!`;
      document.getElementById('my-avatar').textContent = data.avatar;
      if (data.isHost) setHost();
      vibrate(100);
      showScreen('waiting');
    });

    // Host assigned (transferred from disconnected host)
    socket.on('host-assigned', () => { setHost(); });

    function setHost() {
      isHost = true;
      document.getElementById('host-lobby-controls').classList.remove('hidden');
      document.getElementById('non-host-status').classList.add('hidden');
      // Show host buttons on results/gameover if those screens are visible
      document.querySelectorAll('.host-only').forEach(el => el.classList.remove('hidden'));
    }

    socket.on('error-msg', (msg) => {
      // Show on join screen if visible
      document.getElementById('join-error').textContent = msg;
      btnJoin.disabled = false;
      // Also show as toast for any screen
      showToast(msg);
      vibrate([50, 50, 50]);
    });

    function showToast(msg) {
      const existing = document.getElementById('toast-msg');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = 'toast-msg';
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:#ff6b6b;color:#fff;padding:0.75rem 1.5rem;border-radius:0.75rem;font-size:1rem;z-index:999;animation:fadeInSnark 0.3s ease-out;';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Phase changes
    socket.on('phase', (data) => {
      clearInterval(phoneTimer);

      switch (data.phase) {
        case 'lobby':
          // If we've already joined, show waiting screen
          // Otherwise they'd need to rejoin
          if (document.getElementById('my-avatar').textContent) {
            showScreen('waiting');
          }
          break;

        case 'prompt':
          hasSubmitted = false;
          showScreen('answer');
          vibrate(200);
          document.getElementById('phone-prompt').textContent = data.prompt;
          document.getElementById('answer-input').value = '';
          document.getElementById('btn-submit').disabled = false;
          setTimeout(() => document.getElementById('answer-input').focus(), 100);

          // Phone timer
          let timeLeft = data.timeLimit;
          const timerEl = document.getElementById('phone-timer');
          timerEl.textContent = timeLeft + 's';
          timerEl.classList.remove('timer-urgent');
          phoneTimer = setInterval(() => {
            timeLeft--;
            timerEl.textContent = Math.max(0, timeLeft) + 's';
            if (timeLeft <= 10) {
              timerEl.classList.add('timer-urgent');
              if (timeLeft > 0) {
                vibrate(50);
                playSound('tick');
              }
            }
            if (timeLeft <= 0) {
              clearInterval(phoneTimer);
              // Auto-submit if they typed something and haven't submitted
              if (!hasSubmitted) {
                const text = document.getElementById('answer-input').value.trim();
                if (text) {
                  hasSubmitted = true;
                  document.getElementById('btn-submit').disabled = true;
                  document.getElementById('my-answer-note').textContent = `Your answer: "${text}"`;
                  socket.emit('answer', text);
                  showScreen('answered');
                }
              }
            }
          }, 1000);
          break;

        case 'vote':
          showScreen('vote');
          vibrate(150);
          document.getElementById('vote-prompt-reminder').textContent = data.prompt || '';
          const options = document.getElementById('vote-options');
          // Server already filtered out our own answer
          options.innerHTML = data.answers
            .map(a =>
              `<button class="vote-btn" data-id="${a.id}">${escapeHtml(a.text)}</button>`
            ).join('');

          // Vote countdown on phone
          if (data.timeLimit) {
            let voteTimeLeft = data.timeLimit;
            const voteTimerEl = document.getElementById('vote-timer');
            if (voteTimerEl) {
              voteTimerEl.textContent = voteTimeLeft + 's';
              voteTimerEl.classList.remove('timer-urgent');
              phoneTimer = setInterval(() => {
                voteTimeLeft--;
                voteTimerEl.textContent = Math.max(0, voteTimeLeft) + 's';
                if (voteTimeLeft <= 5) voteTimerEl.classList.add('timer-urgent');
                if (voteTimeLeft <= 0) clearInterval(phoneTimer);
              }, 1000);
            }
          }

          // Vote click handlers
          let hasVoted = false;
          options.querySelectorAll('.vote-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              if (hasVoted) return;
              hasVoted = true;
              clearInterval(phoneTimer);
              vibrate(80);
              playSound('vote-cast');
              socket.emit('vote', btn.dataset.id);
              options.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
            });
          });
          break;

        case 'results':
          showScreen('roundEnd');
          playSound('reveal');
          document.getElementById('phone-round-label').textContent =
            `Round ${data.round} of ${data.totalRounds}`;
          document.getElementById('phone-commentary').textContent = data.commentary || '';

          // Show results on phone
          const resultsEl = document.getElementById('phone-results');
          resultsEl.innerHTML = data.results.map(r =>
            `<div class="phone-result-card">
              <div class="phone-result-text">"${escapeHtml(r.text)}"</div>
              <div class="phone-result-meta">${r.avatar} ${escapeHtml(r.author)} — ${'⭐'.repeat(r.votes)}${r.votes === 0 ? '—' : ''} ${r.votes} vote${r.votes !== 1 ? 's' : ''}</div>
            </div>`
          ).join('');

          const myScore = data.scoreboard.find(p => p.id === myId);
          document.getElementById('phone-score').textContent =
            myScore ? `Your score: ${myScore.score} pts` : '';

          // Show scoreboard on phone
          renderPhoneScoreboard('phone-scoreboard', data.scoreboard);

          // Host: update next round button text
          if (isHost) {
            const nextBtn = document.getElementById('btn-host-next');
            nextBtn.textContent = data.round >= data.totalRounds ? 'Final Scores' : 'Next Round';
          }
          break;

        case 'gameover':
          showScreen('gameover');
          playSound('gameover');
          vibrate([100, 100, 100, 100, 300]);
          const finalMe = data.scoreboard.find(p => p.id === myId);
          const rank = data.scoreboard.findIndex(p => p.id === myId) + 1;
          const rankEmoji = ['🥇', '🥈', '🥉'][rank - 1] || '';
          document.getElementById('final-rank').textContent =
            rank > 0 ? (rankEmoji ? `${rankEmoji} #${rank}` : `#${rank}`) : '';
          document.getElementById('final-score').textContent =
            finalMe ? `${finalMe.score} point${finalMe.score !== 1 ? 's' : ''}` : '';

          // Show final scoreboard on phone
          renderPhoneScoreboard('final-phone-scoreboard', data.scoreboard);
          break;
      }
    });

    // Submit answer
    document.getElementById('btn-submit').addEventListener('click', () => {
      if (hasSubmitted) return;
      const text = document.getElementById('answer-input').value.trim();
      if (!text) return;
      hasSubmitted = true;
      clearInterval(phoneTimer);
      document.getElementById('btn-submit').disabled = true;
      document.getElementById('my-answer-note').textContent = `Your answer: "${text}"`;
      vibrate(100);
      socket.emit('answer', text);
    });

    socket.on('answer-received', () => {
      showScreen('answered');
    });

    socket.on('vote-received', () => {
      showScreen('voted');
    });

    // Update emoji picker to show taken avatars
    socket.on('player-update', (players) => {
      // Grey out taken avatars in the picker
      const takenAvatars = players.map(p => p.avatar);
      emojiPicker.querySelectorAll('.emoji-option').forEach(btn => {
        const emoji = btn.textContent;
        const isTaken = takenAvatars.includes(emoji) && emoji !== selectedAvatar;
        btn.classList.toggle('taken', isTaken);
        btn.disabled = isTaken;
      });

      // Host: update start button
      if (!isHost) return;
      const btn = document.getElementById('btn-host-start');
      btn.disabled = players.length < 2;
      document.getElementById('host-lobby-status').textContent =
        players.length < 2
          ? `Need at least 2 players (${players.length} joined)`
          : `${players.length} players ready!`;
    });

    // Host: round picker
    let selectedRounds = 10;
    document.querySelectorAll('.phone-round-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.phone-round-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRounds = parseInt(btn.dataset.rounds);
      });
    });

    // Host: start game
    document.getElementById('btn-host-start').addEventListener('click', () => {
      socket.emit('start-game', selectedRounds);
    });

    // Host: next round
    document.getElementById('btn-host-next').addEventListener('click', () => {
      socket.emit('next-round');
    });

    // Host: play again
    document.getElementById('btn-host-again').addEventListener('click', () => {
      socket.emit('play-again');
    });

    // Helpers
    function renderPhoneScoreboard(elementId, scoreboard) {
      const medals = ['🥇', '🥈', '🥉'];
      document.getElementById(elementId).innerHTML = scoreboard.map((p, i) =>
        `<div class="phone-score-row ${p.id === myId ? 'phone-score-me' : ''}">
          <span>${medals[i] || ''} ${p.avatar} ${escapeHtml(p.name)}</span>
          <span>${p.score} pts</span>
        </div>`
      ).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
